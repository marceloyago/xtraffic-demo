<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XTraffic IA — by XLink Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"><\/script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Exo 2',sans-serif;background:#04071A;color:#fff;overflow:hidden;height:100vh}
a{text-decoration:none;color:inherit}
.xta-shell{display:flex;height:100vh;background:#04071A;overflow:hidden;position:relative}
.xta-shell::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,245,204,0.012) 3px,rgba(0,245,204,0.012) 4px)}
.xta-shell::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 40% 40% at 15% 50%,rgba(0,245,204,0.055) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 85% 20%,rgba(0,170,255,0.06) 0%,transparent 70%)}
.xta-sidebar{width:232px;flex-shrink:0;display:flex;flex-direction:column;position:relative;z-index:10;background:rgba(4,8,28,0.92);border-right:1px solid rgba(0,245,204,0.1);backdrop-filter:blur(20px);overflow:hidden}
.xta-sidebar::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#00F5CC,#00AAFF,transparent);animation:slideLine 3s ease-in-out infinite}
@keyframes slideLine{0%,100%{opacity:.4}50%{opacity:1}}
.xta-logo-area{padding:20px 16px 16px;border-bottom:1px solid rgba(0,245,204,.08)}
.xta-logo-row{display:flex;align-items:center;gap:10px}
.xta-logo-img-wrap{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,rgba(0,245,204,.15),rgba(0,170,255,.15));border:1px solid rgba(0,245,204,.3);display:flex;align-items:center;justify-content:center;font-size:20px}
.xta-logo-title{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;line-height:1}
.xta-logo-x{color:#00F5CC}.xta-logo-rest{color:#00AAFF}
.xta-logo-ai{color:rgba(255,255,255,.4);font-size:10px;font-family:'Exo 2',sans-serif;display:block;margin-top:3px;letter-spacing:2.5px}
.xta-ia-badge{display:flex;align-items:center;gap:5px;margin-top:10px;padding:4px 8px;border-radius:20px;background:rgba(0,245,204,.08);border:1px solid rgba(0,245,204,.2);width:fit-content;font-size:10px;font-weight:600;color:#00F5CC;letter-spacing:.5px;text-transform:uppercase}
.xta-ia-dot{width:5px;height:5px;border-radius:50%;background:#00F5CC;animation:iaPulse 1.5s ease-in-out infinite}
@keyframes iaPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,245,204,.7)}50%{box-shadow:0 0 0 5px rgba(0,245,204,0)}}
.xta-nav{flex:1;overflow-y:auto;padding:12px 10px;scrollbar-width:none}
.xta-nav::-webkit-scrollbar{display:none}
.nav-section{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.2);padding:4px 8px 8px;margin-top:4px}
.xta-nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;font-size:13px;font-weight:500;color:rgba(255,255,255,.45);position:relative;overflow:hidden;transition:all .25s;margin-bottom:2px;border:1px solid transparent;cursor:pointer;user-select:none}
.xta-nav-item:hover{color:rgba(255,255,255,.85);background:rgba(0,245,204,.05);border-color:rgba(0,245,204,.1);transform:translateX(3px)}
.xta-nav-item.active{color:#00F5CC;background:linear-gradient(90deg,rgba(0,245,204,.12),rgba(0,170,255,.06));border-color:rgba(0,245,204,.2)}
.xta-nav-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:2px;border-radius:2px;background:linear-gradient(#00F5CC,#00AAFF);box-shadow:0 0 8px #00F5CC}
.xta-nav-item svg{flex-shrink:0;width:16px;height:16px}
.nav-arrow{margin-left:auto;opacity:0;transition:opacity .2s;font-size:12px}
.xta-nav-item.active .nav-arrow,.xta-nav-item:hover .nav-arrow{opacity:1}
.xta-sidebar-footer{padding:12px;border-top:1px solid rgba(0,245,204,.08)}
.xta-upgrade{padding:12px;background:linear-gradient(135deg,rgba(0,245,204,.08),rgba(0,170,255,.06));border:1px solid rgba(0,245,204,.15);border-radius:12px;margin-bottom:10px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .3s}
.xta-upgrade:hover{border-color:rgba(0,245,204,.35);box-shadow:0 4px 20px rgba(0,245,204,.1)}
.xta-upgrade-icon{width:30px;height:30px;border-radius:8px;flex-shrink:0;background:linear-gradient(135deg,#00C49A,#0099E6);display:flex;align-items:center;justify-content:center;font-size:14px}
.xta-upgrade-title{font-size:12px;font-weight:600;color:#fff}.xta-upgrade-sub{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px}
.xta-user-row{display:flex;align-items:center;gap:10px}
.xta-avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(0,245,204,.3);display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#00C49A,#0099E6);font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:#04071A}
.xta-user-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.8)}.xta-user-email{font-size:10px;color:rgba(255,255,255,.3)}
.xta-logout{margin-left:auto;flex-shrink:0;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.25);padding:4px;border-radius:6px;transition:all .2s;font-size:16px}
.xta-logout:hover{color:#f87171;background:rgba(239,68,68,.08)}
.xta-main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:5;animation:mainFadeIn .6s .3s ease both;opacity:0}
@keyframes mainFadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1}}
.xta-header{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:62px;flex-shrink:0;background:rgba(4,8,28,.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,245,204,.08);position:relative;z-index:100}
.xta-header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 5%,rgba(0,245,204,.3) 30%,rgba(0,170,255,.3) 70%,transparent 95%)}
.xta-header-title{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;line-height:1}
.accent{color:#00f5cc}
.xta-header-desc{font-size:12px;color:rgba(255,255,255,.35);margin-top:3px}
.xta-header-right{display:flex;align-items:center;gap:12px}
.xta-bell{width:34px;height:34px;border-radius:8px;border:1px solid rgba(255,255,255,.08);cursor:pointer;background:rgba(255,255,255,.04);color:rgba(255,255,255,.45);display:flex;align-items:center;justify-content:center;transition:all .2s;position:relative;font-size:15px}
.xta-bell:hover{background:rgba(0,245,204,.07);border-color:rgba(0,245,204,.25);color:#00F5CC}
.nbadge{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:#ef4444;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff;border:2px solid #04071A}
.hdr-avatar{width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(0,245,204,.3);display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#00C49A,#0099E6);font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:#04071A;cursor:pointer}
.xta-content{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;background:radial-gradient(ellipse 60% 40% at 80% 10%,rgba(0,170,255,.04) 0%,transparent 60%),#04071A;scrollbar-width:thin;scrollbar-color:rgba(0,245,204,.2) transparent;padding:24px}
.xta-content::-webkit-scrollbar{width:4px}
.xta-content::-webkit-scrollbar-thumb{background:rgba(0,245,204,.2);border-radius:4px}
.page{display:none}.page.active{display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:20px}
.kc{background:linear-gradient(135deg,#0d1f3c,#081220);border:1px solid rgba(148,111,64,.13);border-radius:14px;padding:16px 18px;position:relative;overflow:hidden}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kc-gold::before{background:linear-gradient(90deg,#946F40,#c9a060)}
.kc-cyan::before{background:linear-gradient(90deg,#00F5CC,#00AAFF)}
.kc-green::before{background:#22c55e}
.kc-red::before{background:#ef4444}
.kc-blue::before{background:#3b82f6}
.kc-purple::before{background:#a855f7}
.kc-label{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.35);text-transform:uppercase;font-weight:600;margin-bottom:8px;font-family:'Orbitron',sans-serif}
.kc-val{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;line-height:1;margin-bottom:4px}
.kc-sub{font-size:10px;color:rgba(255,255,255,.35);margin-bottom:3px}
.kc-chg{font-size:11px;font-weight:600}
.up{color:#22c55e}.dn{color:#ef4444}.neu{color:#3b82f6}
.gcard{background:linear-gradient(135deg,#0d1f3c,#081220);border:1px solid rgba(148,111,64,.13);border-radius:16px;overflow:hidden;margin-bottom:16px}
.gh{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.05)}
.gt{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.4);text-transform:uppercase}
.gb{padding:16px 18px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.mrow:last-child{border:none}
.ml{font-size:11px;color:rgba(255,255,255,.4)}.mv{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:10px 12px;text-align:left;font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:1.5px;color:rgba(255,255,255,.28);border-bottom:1px solid rgba(255,255,255,.06)}
.tbl td{padding:11px 12px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle}
.tbl tr:last-child td{border:none}
.tbl tr:hover td{background:rgba(0,245,204,.015)}
.cn{font-weight:600;font-size:13px;color:#fff;margin-bottom:2px}.cs{font-size:10px;color:rgba(255,255,255,.35)}
.db{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:6px;font-size:8px;font-family:'Orbitron',sans-serif;letter-spacing:1px;font-weight:700;white-space:nowrap}
.dE{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
.dM{background:rgba(59,130,246,.12);color:#3b82f6;border:1px solid rgba(59,130,246,.3)}
.dR{background:rgba(249,115,22,.12);color:#f97316;border:1px solid rgba(249,115,22,.3)}
.dP{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.dT{background:rgba(168,85,247,.12);color:#a855f7;border:1px solid rgba(168,85,247,.3)}
.hb{min-width:70px}.hn{font-size:10px;font-weight:700;margin-bottom:3px}
.hbr{height:3px;border-radius:2px;background:rgba(255,255,255,.07);overflow:hidden}
.hbf{height:100%;border-radius:2px}
.di-row{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.di-row:last-child{border:none}
.di-ic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.i-w{background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.25)}
.i-s{background:rgba(96,165,250,.12);border:1px solid rgba(96,165,250,.25)}
.i-m{background:rgba(0,245,204,.12);border:1px solid rgba(0,245,204,.25)}
.di-title{font-size:12px;font-weight:700;color:#fff;margin-bottom:3px}
.di-desc{font-size:11px;color:rgba(255,255,255,.4);line-height:1.5}
.di-meta{font-size:9px;color:rgba(255,255,255,.2);margin-top:3px}
.al{display:flex;gap:10px;padding:11px;border-radius:10px;margin-bottom:8px;align-items:flex-start}
.al-s{background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.2)}
.al-w{background:rgba(249,115,22,.06);border:1px solid rgba(249,115,22,.25)}
.al-i{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.2)}
.al-c{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2)}
.al-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.d-s{background:#22c55e}.d-w{background:#f97316}.d-i{background:#3b82f6}.d-c{background:#ef4444}
.al-title{font-size:12px;font-weight:700;margin-bottom:2px}
.al-desc{font-size:10px;color:rgba(255,255,255,.4);line-height:1.5}
.ag-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.ag-card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px;text-align:center}
.ag-em{font-size:28px;margin-bottom:8px;display:block}
.ag-nm{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.4);margin-bottom:6px}
.ag-vl{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900}
.ag-ds{font-size:10px;color:rgba(255,255,255,.35);margin-top:4px}
.ag-st{font-size:9px;margin-top:6px;color:#22c55e}
.roi-box{padding:14px;border-radius:12px;background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.18);text-align:center;margin-top:12px}
.roi-lbl{font-size:9px;color:rgba(255,255,255,.35);font-family:'Orbitron',sans-serif;letter-spacing:2px;margin-bottom:6px}
.roi-num{font-family:'Orbitron',sans-serif;font-size:34px;font-weight:900;color:#22c55e}
.roi-sub{font-size:10px;color:rgba(255,255,255,.35);margin-top:4px}
.cria-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:14px}
.cc{background:linear-gradient(135deg,#0d1f3c,#081220);border:1px solid rgba(148,111,64,.13);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s}
.cc:hover{border-color:rgba(0,245,204,.3);transform:translateY(-2px)}
.cc-thumb{height:148px;display:flex;align-items:center;justify-content:center;position:relative;font-size:44px;overflow:hidden}
.cc-ov{position:absolute;bottom:0;left:0;right:0;padding:10px;background:linear-gradient(transparent,rgba(0,0,0,.85));font-size:10px;font-weight:600;color:rgba(255,255,255,.7)}
.cc-inf{padding:12px}
.cc-nm{font-size:11px;font-weight:600;margin-bottom:4px;line-height:1.4}
.cc-mt{font-size:10px;color:rgba(255,255,255,.35)}
.sp-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.sp{flex:1;min-width:90px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px 14px}
.sp-lb{font-size:8px;color:rgba(255,255,255,.3);letter-spacing:1.5px;text-transform:uppercase;font-family:'Orbitron',sans-serif;margin-bottom:4px}
.sp-vl{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:900}
.btn-primary{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:9px;background:rgba(0,245,204,.08);border:1px solid rgba(0,245,204,.22);color:#00F5CC;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Exo 2',sans-serif}
.btn-primary:hover{background:rgba(0,245,204,.14);box-shadow:0 0 16px rgba(0,245,204,.15)}
.sync-spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tog{width:34px;height:19px;border-radius:10px;border:1px solid rgba(34,197,94,.4);background:rgba(34,197,94,.15);position:relative;cursor:pointer;flex-shrink:0}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:11px;height:11px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,.6);transform:translateX(15px);transition:transform .3s}
</style>
</head>

function go(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.xta-nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('p-'+id).classList.add('active');
  if(el) el.classList.add('active');
  else document.querySelectorAll('.xta-nav-item')[Object.keys(PAGES).indexOf(id)]?.classList.add('active');
  document.getElementById('hdr-title').innerHTML = PAGES[id].replace(/IA|FB/g,m=>`<span class="accent">${m}</span>`);
  document.getElementById('hdr-desc').textContent = DESCS[id];
  if(id==='relatorio') initCharts();
  if(id==='dashboard') initDashChart();
}
